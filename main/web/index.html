<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MusicPlayer</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f6f8;
        color: #1b1f24;
        --surface: #ffffff;
        --surface-soft: #eef3f6;
        --border: #d6dee6;
        --muted: #66707d;
        --accent: #087f8c;
        --accent-strong: #06636d;
        --danger: #b42318;
        --ok: #147a50;
        --shadow: 0 12px 28px rgba(22, 35, 48, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(8, 127, 140, 0.08), transparent 260px),
          #f4f6f8;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button {
        min-height: 40px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        color: inherit;
        cursor: pointer;
      }

      button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #ffffff;
      }

      button.primary:hover {
        background: var(--accent-strong);
      }

      button.danger {
        border-color: #f0b8b3;
        color: var(--danger);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .app {
        width: min(1120px, 94vw);
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 1.45rem;
      }

      h2 {
        font-size: 1.2rem;
      }

      h3 {
        font-size: 0.95rem;
      }

      .status {
        color: var(--muted);
        font-size: 0.9rem;
        text-align: right;
      }

      .top-nav {
        position: sticky;
        top: 0;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 24px;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
      }

      .nav-group {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .nav-button {
        min-height: 36px;
        padding: 0 12px;
      }

      .nav-button.active {
        border-color: var(--accent);
        background: #e7f6f7;
        color: var(--accent-strong);
      }

      .home {
        min-height: calc(100vh - 150px);
        display: grid;
        place-items: center;
      }

      .route-panel {
        width: min(680px, 100%);
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .route-button {
        min-height: 132px;
        padding: 18px;
        text-align: left;
        background: var(--surface);
        border-color: var(--border);
        box-shadow: var(--shadow);
      }

      .route-button strong {
        display: block;
        margin-bottom: 8px;
        font-size: 1rem;
      }

      .route-button span {
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.35;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 18px;
      }

      .toolbar-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .view {
        display: none;
      }

      .view.active {
        display: block;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1.4fr) minmax(280px, 0.8fr);
        gap: 16px;
        align-items: start;
      }

      .section {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
        box-shadow: var(--shadow);
      }

      .music-list,
      .queue-list {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }

      .music-row,
      .queue-row {
        display: grid;
        grid-template-columns: 48px minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
        min-height: 56px;
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fbfcfd;
      }

      .queue-row {
        grid-template-columns: minmax(0, 1fr) auto;
      }

      .cover {
        width: 48px;
        height: 48px;
        border-radius: 6px;
        background: var(--surface-soft);
        object-fit: cover;
      }

      .cover.empty {
        display: grid;
        place-items: center;
        color: var(--muted);
        font-weight: 700;
      }

      .name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .meta {
        color: var(--muted);
        font-size: 0.82rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .file-input {
        width: 100%;
        min-height: 42px;
        padding: 8px;
        border: 1px dashed var(--border);
        border-radius: 8px;
        background: #fbfcfd;
      }

      textarea {
        width: 100%;
        min-height: 460px;
        resize: vertical;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        background: #fbfcfd;
        color: #111827;
        line-height: 1.45;
      }

      pre {
        min-height: 460px;
        max-height: 66vh;
        overflow: auto;
        margin: 0;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #101820;
        color: #d8f3dc;
        line-height: 1.45;
        white-space: pre-wrap;
      }

      .inline-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 12px;
      }

      .empty-state {
        padding: 22px;
        color: var(--muted);
        text-align: center;
        border: 1px dashed var(--border);
        border-radius: 8px;
        background: #fbfcfd;
      }

      .ok {
        color: var(--ok);
      }

      .fail {
        color: var(--danger);
      }

      @media (max-width: 760px) {
        header,
        .top-nav,
        .toolbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .status {
          text-align: left;
        }

        .route-panel,
        .grid {
          grid-template-columns: 1fr;
        }

        .route-button {
          min-height: 104px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <div>
          <h1>MusicPlayer</h1>
          <p class="meta">192.168.4.1</p>
        </div>
        <div class="status" id="status">Pronto</div>
      </header>

      <nav class="top-nav" aria-label="Navegacao principal">
        <button id="back-button" class="nav-button" type="button" disabled>Voltar</button>
        <div class="nav-group">
          <button class="nav-button active" type="button" data-route="home-view">Inicio</button>
          <button class="nav-button" type="button" data-route="music-view">Musicas</button>
          <button class="nav-button" type="button" data-route="config-view">Configs</button>
          <button class="nav-button" type="button" data-route="error-view">Erros</button>
        </div>
      </nav>

      <main>
        <section id="home-view" class="view active home">
          <div class="route-panel">
            <button class="route-button" data-route="music-view">
              <strong>Musicas</strong>
              <span>Visualizacao, envio e remocao por fila.</span>
            </button>
            <button class="route-button" data-route="config-view">
              <strong>Configs</strong>
              <span>Arquivo JSON em /.system/config.json.</span>
            </button>
            <button class="route-button" data-route="error-view">
              <strong>Erros</strong>
              <span>Leitura do arquivo /.system/errors.log.</span>
            </button>
          </div>
        </section>

        <section id="music-view" class="view">
          <div class="toolbar">
            <h2>Musicas</h2>
            <div class="toolbar-actions">
              <button data-route="home-view">Inicio</button>
              <button id="refresh-musics">Atualizar</button>
            </div>
          </div>
          <div class="grid">
            <div class="section">
              <h3>Biblioteca</h3>
              <div id="music-list" class="music-list"></div>
            </div>
            <aside class="section">
              <h3>Fila</h3>
              <input id="music-files" class="file-input" type="file" accept=".mp3,audio/mpeg" multiple />
              <div class="inline-actions">
                <button id="upload-queue" class="primary">Enviar</button>
                <button id="delete-selected" class="danger">Remover selecionadas</button>
              </div>
              <div id="queue-list" class="queue-list"></div>
            </aside>
          </div>
        </section>

        <section id="config-view" class="view">
          <div class="toolbar">
            <h2>Configs</h2>
            <div class="toolbar-actions">
              <button data-route="home-view">Inicio</button>
              <button id="reload-config">Recarregar</button>
              <button id="save-config" class="primary">Salvar</button>
            </div>
          </div>
          <textarea id="config-editor" spellcheck="false"></textarea>
        </section>

        <section id="error-view" class="view">
          <div class="toolbar">
            <h2>Erros</h2>
            <div class="toolbar-actions">
              <button data-route="home-view">Inicio</button>
              <button id="reload-errors">Recarregar</button>
            </div>
          </div>
          <pre id="error-log"></pre>
        </section>
      </main>
    </div>

    <script>
      const state = {
        musics: [],
        selected: new Set(),
        uploadQueue: [],
        busy: false,
        currentView: "home-view",
        history: [],
      };

      const statusEl = document.querySelector("#status");
      const backButtonEl = document.querySelector("#back-button");
      const musicListEl = document.querySelector("#music-list");
      const queueListEl = document.querySelector("#queue-list");
      const fileInputEl = document.querySelector("#music-files");
      const configEditorEl = document.querySelector("#config-editor");
      const errorLogEl = document.querySelector("#error-log");

      function setStatus(text, kind = "") {
        statusEl.textContent = text;
        statusEl.className = `status ${kind}`;
      }

      function updateNavigation() {
        document.querySelectorAll(".nav-button[data-route]").forEach((button) => {
          button.classList.toggle("active", button.dataset.route === state.currentView);
        });
        backButtonEl.disabled = state.history.length === 0;
      }

      function showView(id, options = {}) {
        if (id === state.currentView) {
          return;
        }

        if (options.pushHistory !== false) {
          state.history.push(state.currentView);
        }

        document.querySelectorAll(".view").forEach((view) => view.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        state.currentView = id;
        updateNavigation();

        if (id === "music-view") loadMusics();
        if (id === "config-view") loadConfig();
        if (id === "error-view") loadErrors();
      }

      function goBack() {
        const previous = state.history.pop() || "home-view";
        showView(previous, { pushHistory: false });
      }

      function renderMusics() {
        if (!state.musics.length) {
          musicListEl.innerHTML = '<div class="empty-state">Nenhuma musica encontrada.</div>';
          return;
        }

        musicListEl.innerHTML = "";
        state.musics.forEach((music) => {
          const row = document.createElement("button");
          row.className = "music-row";
          row.type = "button";

          const cover = music.logo ? document.createElement("img") : document.createElement("div");
          cover.className = music.logo ? "cover" : "cover empty";
          if (music.logo) {
            cover.src = music.logo;
            cover.alt = "";
          } else {
            cover.textContent = "MP3";
          }

          const info = document.createElement("div");
          info.innerHTML = `<div class="name"></div><div class="meta"></div>`;
          info.querySelector(".name").textContent = music.nome;
          info.querySelector(".meta").textContent = music.author || "Autor desconhecido";

          const check = document.createElement("input");
          check.type = "checkbox";
          check.checked = state.selected.has(music.nome);
          check.addEventListener("click", (event) => {
            event.stopPropagation();
            if (check.checked) state.selected.add(music.nome);
            else state.selected.delete(music.nome);
          });

          row.append(cover, info, check);
          musicListEl.append(row);
        });
      }

      function renderQueue() {
        if (!state.uploadQueue.length) {
          queueListEl.innerHTML = '<div class="empty-state">Fila vazia.</div>';
          return;
        }

        queueListEl.innerHTML = "";
        state.uploadQueue.forEach((item) => {
          const row = document.createElement("div");
          row.className = "queue-row";

          const info = document.createElement("div");
          info.innerHTML = `<div class="name"></div><div class="meta"></div>`;
          info.querySelector(".name").textContent = item.file.name;
          info.querySelector(".meta").textContent = item.status;

          const stateLabel = document.createElement("span");
          stateLabel.className = item.done ? "ok" : item.error ? "fail" : "";
          stateLabel.textContent = item.done ? "ok" : item.error ? "erro" : "fila";

          row.append(info, stateLabel);
          queueListEl.append(row);
        });
      }

      async function loadMusics() {
        setStatus("Carregando musicas");
        try {
          const response = await fetch("/musics", { cache: "no-store" });
          if (!response.ok) throw new Error(await response.text());
          const data = await response.json();
          state.musics = Array.isArray(data.musicas) ? data.musicas : [];
          renderMusics();
          setStatus("Musicas atualizadas", "ok");
        } catch (error) {
          setStatus("Falha ao carregar musicas", "fail");
        }
      }

      async function uploadQueue() {
        if (state.busy || !state.uploadQueue.length) return;
        state.busy = true;
        setStatus("Enviando fila");

        for (const item of state.uploadQueue) {
          if (item.done) continue;
          item.status = "enviando";
          renderQueue();

          try {
            const response = await fetch(`/musics?nome=${encodeURIComponent(item.file.name)}`, {
              method: "PUT",
              headers: { "Content-Type": item.file.type || "audio/mpeg" },
              body: item.file,
            });
            if (!response.ok) throw new Error(await response.text());
            item.done = true;
            item.status = "enviado";
          } catch (error) {
            item.error = true;
            item.status = "falhou";
          }
          renderQueue();
        }

        state.busy = false;
        setStatus("Fila finalizada", "ok");
        await loadMusics();
      }

      async function deleteSelected() {
        if (state.busy || !state.selected.size) return;
        state.busy = true;
        setStatus("Removendo selecionadas");

        for (const name of Array.from(state.selected)) {
          try {
            const response = await fetch(`/musics?nome=${encodeURIComponent(name)}`, { method: "DELETE" });
            if (!response.ok) throw new Error(await response.text());
            state.selected.delete(name);
          } catch (error) {
            setStatus(`Falha removendo ${name}`, "fail");
            break;
          }
        }

        state.busy = false;
        await loadMusics();
      }

      async function loadConfig() {
        setStatus("Carregando config");
        try {
          const response = await fetch("/get-configs", { cache: "no-store" });
          if (!response.ok) throw new Error(await response.text());
          const json = await response.json();
          configEditorEl.value = JSON.stringify(json, null, 2);
          setStatus("Config carregada", "ok");
        } catch (error) {
          setStatus("Falha ao carregar config", "fail");
        }
      }

      async function saveConfig() {
        setStatus("Salvando config");
        try {
          const parsed = JSON.parse(configEditorEl.value);
          const response = await fetch("/configs", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(parsed),
          });
          if (!response.ok) throw new Error(await response.text());
          setStatus("Config salva", "ok");
        } catch (error) {
          setStatus("JSON invalido ou falha ao salvar", "fail");
        }
      }

      async function loadErrors() {
        setStatus("Carregando erros");
        try {
          const response = await fetch("/get-errors", { cache: "no-store" });
          if (!response.ok) throw new Error(await response.text());
          errorLogEl.textContent = (await response.text()) || "Sem erros registrados.";
          setStatus("Erros carregados", "ok");
        } catch (error) {
          setStatus("Falha ao carregar erros", "fail");
        }
      }

      document.querySelectorAll("[data-route]").forEach((button) => {
        button.addEventListener("click", () => showView(button.dataset.route));
      });

      backButtonEl.addEventListener("click", goBack);
      document.querySelector("#refresh-musics").addEventListener("click", loadMusics);
      document.querySelector("#upload-queue").addEventListener("click", uploadQueue);
      document.querySelector("#delete-selected").addEventListener("click", deleteSelected);
      document.querySelector("#reload-config").addEventListener("click", loadConfig);
      document.querySelector("#save-config").addEventListener("click", saveConfig);
      document.querySelector("#reload-errors").addEventListener("click", loadErrors);

      fileInputEl.addEventListener("change", () => {
        state.uploadQueue = Array.from(fileInputEl.files || []).map((file) => ({
          file,
          status: "aguardando",
          done: false,
          error: false,
        }));
        renderQueue();
      });

      renderQueue();
      updateNavigation();
    </script>
  </body>
</html>
