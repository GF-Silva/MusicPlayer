<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' data:; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' data:; script-src 'self' 'unsafe-inline'; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'"
    />
    <link rel="icon" href="data:," />
    <title>MusicPlayer</title>

    <style>
      :root {
        --bg: #0d0f14;
        --bg2: #13161e;
        --bg3: #1a1e28;
        --border: rgba(255,255,255,0.07);
        --border-hover: rgba(255,255,255,0.14);
        --accent: #7c6af7;
        --accent-dim: rgba(124,106,247,0.15);
        --accent-glow: rgba(124,106,247,0.35);
        --ok: #3dd68c;
        --ok-dim: rgba(61,214,140,0.12);
        --fail: #f87171;
        --fail-dim: rgba(248,113,113,0.12);
        --warn: #fbbf24;
        --text: #e8eaf0;
        --text2: #8b90a0;
        --text3: #5a5f72;
        --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        --sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --r: 10px;
        --r-lg: 16px;
        color-scheme: dark;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: var(--sans);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        font-size: 14px;
        line-height: 1.6;
      }
      button, input, textarea { font: inherit; }
      a { color: inherit; }

      /* ── SCROLLBAR ── */
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 99px; }

      /* ── LAYOUT ── */
      .app {
        display: grid;
        grid-template-rows: auto auto 1fr;
        min-height: 100vh;
        max-width: 1180px;
        margin: 0 auto;
        padding: 0 20px;
      }

      /* ── HEADER ── */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 28px 0 16px;
        border-bottom: 1px solid var(--border);
      }
      .header-brand { display: flex; align-items: center; gap: 12px; }
      .header-icon {
        width: 36px; height: 36px;
        background: var(--accent-dim);
        border: 1px solid var(--accent-glow);
        border-radius: 10px;
        display: grid; place-items: center;
        font-size: 18px;
      }
      h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: -0.3px; }
      .ip { font-size: 0.75rem; color: var(--text3); font-family: var(--mono); margin-top: 1px; }
      .status-pill {
        font-size: 0.75rem;
        font-family: var(--mono);
        padding: 5px 12px;
        border-radius: 99px;
        border: 1px solid var(--border);
        background: var(--bg2);
        color: var(--text2);
        transition: all 0.3s;
      }
      .status-pill.ok { color: var(--ok); border-color: var(--ok-dim); background: var(--ok-dim); }
      .status-pill.fail { color: var(--fail); border-color: var(--fail-dim); background: var(--fail-dim); }

      /* ── NAV ── */
      .top-nav {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 0;
        background: rgba(13,15,20,0.85);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
      }
      .nav-group { display: flex; gap: 6px; flex-wrap: wrap; }
      .nav-btn {
        min-height: 34px;
        padding: 0 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: transparent;
        color: var(--text2);
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: 500;
        transition: all 0.18s;
        display: flex; align-items: center; gap: 6px;
      }
      .nav-btn:hover { border-color: var(--border-hover); color: var(--text); background: var(--bg2); }
      .nav-btn.active { background: var(--accent-dim); border-color: var(--accent-glow); color: var(--accent); }
      .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
      .nav-btn .dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--accent);
        flex-shrink: 0;
      }

      /* ── MAIN ── */
      main { padding: 28px 0 48px; }

      /* ── VIEWS ── */
      .view { display: none; animation: fadeIn 0.2s ease; }
      .view.active { display: block; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

      /* ── HOME ── */
      .home { min-height: calc(100vh - 200px); display: grid; place-items: center; }
      .home-inner { width: 100%; max-width: 700px; }
      .home-title { font-size: 1.5rem; font-weight: 300; color: var(--text2); margin-bottom: 6px; }
      .home-title strong { color: var(--text); font-weight: 600; }
      .home-sub { font-size: 0.85rem; color: var(--text3); margin-bottom: 32px; }
      .route-panel {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }
      .route-button {
        padding: 22px 20px;
        text-align: left;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        cursor: pointer;
        color: var(--text);
        transition: all 0.2s;
        display: flex; flex-direction: column; gap: 8px;
      }
      .route-button:hover {
        border-color: var(--accent-glow);
        background: var(--bg3);
        transform: translateY(-2px);
      }
      .route-icon { font-size: 22px; margin-bottom: 4px; }
      .route-button strong { font-size: 0.95rem; font-weight: 600; }
      .route-button span { font-size: 0.8rem; color: var(--text3); line-height: 1.4; }

      /* ── TOOLBAR ── */
      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }
      .toolbar-title { display: flex; align-items: center; gap: 10px; }
      h2 { font-size: 1rem; font-weight: 600; }
      .toolbar-actions { display: flex; gap: 8px; flex-wrap: wrap; }
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 99px;
        font-size: 0.7rem;
        font-family: var(--mono);
        font-weight: 500;
        background: var(--bg3);
        border: 1px solid var(--border);
        color: var(--text2);
      }

      /* ── BUTTONS ── */
      .btn {
        display: inline-flex; align-items: center; gap: 7px;
        min-height: 34px;
        padding: 0 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg2);
        color: var(--text);
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: 500;
        transition: all 0.18s;
        white-space: nowrap;
      }
      .btn:hover { border-color: var(--border-hover); background: var(--bg3); }
      .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
      .btn.primary:hover { opacity: 0.88; }
      .btn.danger { color: var(--fail); border-color: rgba(248,113,113,0.25); background: var(--fail-dim); }
      .btn.danger:hover { border-color: rgba(248,113,113,0.5); }
      .btn.ghost { background: transparent; border-color: transparent; color: var(--text2); }
      .btn.ghost:hover { background: var(--bg2); color: var(--text); border-color: var(--border); }
      .btn:disabled { opacity: 0.38; cursor: not-allowed; pointer-events: none; }
      .btn svg { flex-shrink: 0; }

      /* ── GRID ── */
      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1.45fr) 320px;
        gap: 16px;
        align-items: start;
      }

      /* ── SECTION ── */
      .section {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        padding: 18px;
      }
      .section-header {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 14px;
        gap: 8px;
        flex-wrap: wrap;
      }
      .section-header-left { display: flex; align-items: center; gap: 10px; }
      h3 { font-size: 0.82rem; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; }

      /* ── MUSIC LIST ── */
      .music-list, .queue-list { display: grid; gap: 6px; }

      .music-row {
        display: grid;
        grid-template-columns: 44px minmax(0, 1fr) 24px;
        align-items: center;
        gap: 10px;
        padding: 9px 10px;
        border: 1px solid transparent;
        border-radius: var(--r);
        background: var(--bg3);
        transition: all 0.15s;
        cursor: pointer;
      }
      .music-row:hover { border-color: var(--border); }
      .music-row.selected { border-color: var(--accent-glow); background: var(--accent-dim); }

      .cover {
        width: 44px; height: 44px;
        border-radius: 8px;
        background: var(--bg2);
        border: 1px solid var(--border);
        object-fit: cover;
        flex-shrink: 0;
      }
      .cover.empty {
        display: grid; place-items: center;
        font-family: var(--mono);
        font-size: 0.6rem;
        color: var(--text3);
        letter-spacing: 0.05em;
      }

      .music-info { overflow: hidden; }
      .music-name {
        font-size: 0.85rem; font-weight: 500;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .music-meta {
        font-size: 0.75rem; color: var(--text3);
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        margin-top: 1px;
      }

      .music-check {
        width: 16px; height: 16px;
        border: 1.5px solid var(--border-hover);
        border-radius: 4px;
        background: transparent;
        cursor: pointer;
        appearance: none;
        flex-shrink: 0;
        transition: all 0.15s;
        position: relative;
      }
      .music-check:checked {
        background: var(--accent);
        border-color: var(--accent);
      }
      .music-check:checked::after {
        content: '';
        position: absolute;
        inset: 2px;
        background: url("data:image/svg+xml,%3Csvg viewBox='0 0 10 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 4l3 3 5-6' stroke='white' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") no-repeat center / contain;
      }

      /* ── QUEUE ── */
      .queue-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        align-items: center;
        gap: 8px;
        padding: 9px 10px;
        border: 1px solid var(--border);
        border-radius: var(--r);
        background: var(--bg3);
        transition: all 0.15s;
      }
      .queue-row.done { border-color: rgba(61,214,140,0.15); background: rgba(61,214,140,0.04); }
      .queue-row.fail { border-color: rgba(248,113,113,0.15); }

      .queue-name {
        font-size: 0.82rem; font-weight: 500;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .queue-meta { font-size: 0.72rem; color: var(--text3); margin-top: 1px; }

      .status-tag {
        font-family: var(--mono);
        font-size: 0.68rem;
        padding: 3px 8px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--bg2);
        color: var(--text3);
        white-space: nowrap;
      }
      .status-tag.ok { background: var(--ok-dim); border-color: transparent; color: var(--ok); }
      .status-tag.fail { background: var(--fail-dim); border-color: transparent; color: var(--fail); }
      .status-tag.sending { background: var(--accent-dim); border-color: transparent; color: var(--accent); }

      .queue-remove {
        width: 22px; height: 22px;
        border: none;
        background: transparent;
        color: var(--text3);
        cursor: pointer;
        border-radius: 4px;
        display: grid; place-items: center;
        transition: all 0.15s;
        flex-shrink: 0;
      }
      .queue-remove:hover { background: var(--fail-dim); color: var(--fail); }

      /* ── FILE INPUT ── */
      .file-drop {
        width: 100%;
        padding: 16px;
        border: 1.5px dashed var(--border);
        border-radius: var(--r);
        background: transparent;
        color: var(--text3);
        cursor: pointer;
        text-align: center;
        font-size: 0.8rem;
        transition: all 0.2s;
        margin-bottom: 10px;
        position: relative;
        overflow: hidden;
      }
      .file-drop:hover { border-color: var(--accent-glow); color: var(--accent); background: var(--accent-dim); }
      .file-drop input[type=file] {
        position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
      }
      .file-drop-icon { font-size: 20px; margin-bottom: 4px; }

      .queue-actions {
        display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap;
      }

      /* ── CONFIG ── */
      textarea {
        width: 100%;
        min-height: 480px;
        resize: vertical;
        border: 1px solid var(--border);
        border-radius: var(--r);
        padding: 14px;
        background: var(--bg2);
        color: var(--text);
        line-height: 1.6;
        font-family: var(--mono);
        font-size: 0.82rem;
        transition: border-color 0.15s;
      }
      textarea:focus { outline: none; border-color: var(--accent-glow); }

      /* ── ERRORS ── */
      pre {
        min-height: 480px;
        max-height: 70vh;
        overflow: auto;
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: var(--r);
        background: var(--bg2);
        color: #4ade80;
        line-height: 1.6;
        white-space: pre-wrap;
        font-family: var(--mono);
        font-size: 0.8rem;
      }

      /* ── EMPTY STATE ── */
      .empty-state {
        padding: 28px;
        color: var(--text3);
        text-align: center;
        border: 1.5px dashed var(--border);
        border-radius: var(--r);
        font-size: 0.82rem;
        background: transparent;
      }
      .empty-icon { font-size: 24px; margin-bottom: 6px; }

      /* ── DIVIDER ── */
      .divider { height: 1px; background: var(--border); margin: 12px 0; }

      /* ── RESPONSIVE ── */
      @media (max-width: 780px) {
        .route-panel { grid-template-columns: 1fr 1fr; }
        .grid { grid-template-columns: 1fr; }
        header { flex-wrap: wrap; }
        .top-nav { gap: 8px; }
      }
      @media (max-width: 480px) {
        .app { padding: 0 14px; }
        .route-panel { grid-template-columns: 1fr; }
        header { padding: 18px 0 12px; }
        .toolbar { gap: 8px; }
        .toolbar-actions { gap: 6px; }
        .btn { font-size: 0.75rem; padding: 0 10px; min-height: 32px; }
      }

      /* ── INLINE ICON SVGs ── */
      .ico { display: inline-block; vertical-align: middle; flex-shrink: 0; }
    </style>

  </head>
  <body>
    <div class="app">
      <header>
        <div class="header-brand">
          <div class="header-icon">🎵</div>
          <div>
            <h1>MusicPlayer</h1>
            <div class="ip">192.168.4.1</div>
          </div>
        </div>
        <div id="status" class="status-pill">Pronto</div>
      </header>

      <nav class="top-nav" aria-label="Navegação principal">
        <div class="nav-group">
          <button id="back-button" class="nav-btn" type="button" disabled>
            <svg class="ico" width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M8 2.5L4 6.5L8 10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Voltar
          </button>
        </div>
        <div class="nav-group">
          <button class="nav-btn active" type="button" data-route="home-view">
            <span class="dot"></span>Início
          </button>
          <button class="nav-btn" type="button" data-route="music-view">Músicas</button>
          <button class="nav-btn" type="button" data-route="config-view">Configs</button>
          <button class="nav-btn" type="button" data-route="error-view">Erros</button>
        </div>
      </nav>

      <main>
        <!-- HOME -->
        <section id="home-view" class="view active home">
          <div class="home-inner">
            <p class="home-title"><strong>Olá.</strong> O que deseja fazer?</p>
            <p class="home-sub">Gerencie sua biblioteca, configurações e logs.</p>
            <div class="route-panel">
              <button class="route-button" data-route="music-view">
                <div class="route-icon">🎧</div>
                <strong>Músicas</strong>
                <span>Visualize, envie e remova músicas da fila.</span>
              </button>
              <button class="route-button" data-route="config-view">
                <div class="route-icon">⚙️</div>
                <strong>Configs</strong>
                <span>Arquivo JSON em /.system/config.json.</span>
              </button>
              <button class="route-button" data-route="error-view">
                <div class="route-icon">📋</div>
                <strong>Erros</strong>
                <span>Leitura do arquivo /.system/errors.log.</span>
              </button>
            </div>
          </div>
        </section>

        <!-- MÚSICAS -->
        <section id="music-view" class="view">
          <div class="toolbar">
            <div class="toolbar-title">
              <h2>Músicas</h2>
              <span class="badge" id="music-count">—</span>
            </div>
            <div class="toolbar-actions">
              <button class="btn ghost" data-route="home-view">Início</button>
              <button class="btn" id="refresh-musics">
                <svg class="ico" width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M11 6.5A4.5 4.5 0 1 1 6.5 2a4.5 4.5 0 0 1 3.18 1.32" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M9.5 1.5v2.5H7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Atualizar
              </button>
            </div>
          </div>
          <div class="grid">
            <div class="section">
              <div class="section-header">
                <div class="section-header-left">
                  <h3>Biblioteca</h3>
                  <span class="badge" id="selected-count">0 selecionadas</span>
                </div>
                <div style="display:flex;gap:6px;flex-wrap:wrap;">
                  <button class="btn ghost" id="select-all-musics" style="font-size:0.75rem;min-height:28px;padding:0 10px;">Selecionar todas</button>
                  <button class="btn danger" id="delete-selected">
                    <svg class="ico" width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 3h8M5 3V2h2v1M3.5 3l.5 7h4l.5-7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    Remover
                  </button>
                </div>
              </div>
              <div id="music-list" class="music-list"></div>
            </div>

            <aside class="section">
              <div class="section-header">
                <h3>Fila de envio</h3>
                <span class="badge" id="queue-count">0</span>
              </div>

              <label class="file-drop" for="music-files">
                <div class="file-drop-icon">📁</div>
                <div>Clique ou arraste arquivos .mp3</div>
                <input id="music-files" type="file" accept=".mp3,audio/mpeg" multiple />
              </label>

              <div class="queue-actions">
                <button class="btn primary" id="upload-queue" style="flex:1;">
                  <svg class="ico" width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 9V4M4 6.5L6.5 4 9 6.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 10.5h9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
                  Enviar
                </button>
                <button class="btn danger" id="clear-done" title="Remover concluídas">
                  <svg class="ico" width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 4h9M5 4V3h3v1M3.5 4l.5 7h5l.5-7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M5.5 6.5l2 2m0-2l-2 2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
                  Limpar concluídas
                </button>
              </div>

              <div id="queue-list" class="queue-list"></div>
            </aside>
          </div>
        </section>

        <!-- CONFIGS -->
        <section id="config-view" class="view">
          <div class="toolbar">
            <h2>Configurações</h2>
            <div class="toolbar-actions">
              <button class="btn ghost" data-route="home-view">Início</button>
              <button class="btn" id="reload-config">Recarregar</button>
              <button class="btn primary" id="save-config">Salvar</button>
            </div>
          </div>
          <textarea id="config-editor" spellcheck="false"></textarea>
        </section>

        <!-- ERROS -->
        <section id="error-view" class="view">
          <div class="toolbar">
            <h2>Log de Erros</h2>
            <div class="toolbar-actions">
              <button class="btn ghost" data-route="home-view">Início</button>
              <button class="btn" id="reload-errors">Recarregar</button>
            </div>
          </div>
          <pre id="error-log"></pre>
        </section>
      </main>
    </div>

    <script>
      const state = {
        musics: [],
        selected: new Set(),
        uploadQueue: [],
        busy: false,
        currentView: 'home-view',
        history: [],
      };

      const $id = (id) => document.getElementById(id);
      const statusEl = $id('status');
      const backBtnEl = $id('back-button');
      const musicListEl = $id('music-list');
      const queueListEl = $id('queue-list');
      const fileInputEl = $id('music-files');
      const configEditorEl = $id('config-editor');
      const errorLogEl = $id('error-log');
      const musicCountEl = $id('music-count');
      const selectedCountEl = $id('selected-count');
      const queueCountEl = $id('queue-count');

      function setStatus(text, kind = '') {
        statusEl.textContent = text;
        statusEl.className = 'status-pill ' + kind;
      }

      function updateNavigation() {
        document.querySelectorAll('.nav-btn[data-route]').forEach(b => {
          b.classList.toggle('active', b.dataset.route === state.currentView);
          const dot = b.querySelector('.dot');
          if (dot) dot.style.display = b.dataset.route === state.currentView ? '' : 'none';
        });
        backBtnEl.disabled = state.history.length === 0;
        updateDots();
      }

      function updateDots() {
        document.querySelectorAll('.nav-btn[data-route]').forEach(b => {
          let dot = b.querySelector('.dot');
          if (b.dataset.route === state.currentView) {
            if (!dot) { dot = document.createElement('span'); dot.className = 'dot'; b.prepend(dot); }
          } else {
            if (dot) dot.remove();
          }
        });
      }

      function showView(id, options = {}) {
        if (id === state.currentView) return;
        if (options.pushHistory !== false) state.history.push(state.currentView);
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        state.currentView = id;
        updateNavigation();
        if (id === 'music-view') loadMusics();
        if (id === 'config-view') loadConfig();
        if (id === 'error-view') loadErrors();
      }

      function goBack() {
        const prev = state.history.pop() || 'home-view';
        showView(prev, { pushHistory: false });
      }

      function updateSelectedCount() {
        const n = state.selected.size;
        selectedCountEl.textContent = n === 0 ? '0 selecionadas' : `${n} selecionada${n > 1 ? 's' : ''}`;
        selectedCountEl.style.color = n > 0 ? 'var(--accent)' : '';
        selectedCountEl.style.borderColor = n > 0 ? 'var(--accent-glow)' : '';
      }

      function renderMusics() {
        musicCountEl.textContent = state.musics.length;
        updateSelectedCount();

        if (!state.musics.length) {
          musicListEl.innerHTML = '<div class="empty-state"><div class="empty-icon">🎵</div>Nenhuma música encontrada.</div>';
          return;
        }

        musicListEl.innerHTML = '';
        state.musics.forEach(music => {
          const row = document.createElement('div');
          row.className = 'music-row' + (state.selected.has(music.nome) ? ' selected' : '');
          row.style.cursor = 'pointer';

          const cover = music.logo ? document.createElement('img') : document.createElement('div');
          cover.className = music.logo ? 'cover' : 'cover empty';
          if (music.logo) { cover.src = music.logo; cover.alt = ''; }
          else cover.textContent = 'MP3';

          const info = document.createElement('div');
          info.className = 'music-info';
          info.innerHTML = `<div class="music-name"></div><div class="music-meta"></div>`;
          info.querySelector('.music-name').textContent = music.nome;
          info.querySelector('.music-meta').textContent = music.author || 'Autor desconhecido';

          const check = document.createElement('input');
          check.type = 'checkbox';
          check.className = 'music-check';
          check.checked = state.selected.has(music.nome);

          const toggle = () => {
            if (check.checked) { state.selected.add(music.nome); row.classList.add('selected'); }
            else { state.selected.delete(music.nome); row.classList.remove('selected'); }
            updateSelectedCount();
          };

          check.addEventListener('change', toggle);
          row.addEventListener('click', e => {
            if (e.target === check) return;
            check.checked = !check.checked;
            toggle();
          });

          row.append(cover, info, check);
          musicListEl.append(row);
        });
      }

      function renderQueue() {
        const total = state.uploadQueue.length;
        queueCountEl.textContent = total;

        if (!total) {
          queueListEl.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div>Fila vazia.</div>';
          return;
        }

        queueListEl.innerHTML = '';
        state.uploadQueue.forEach((item, idx) => {
          const row = document.createElement('div');
          row.className = 'queue-row' + (item.done ? ' done' : item.error ? ' fail' : '');

          const info = document.createElement('div');
          info.innerHTML = `<div class="queue-name"></div><div class="queue-meta"></div>`;
          info.querySelector('.queue-name').textContent = item.file.name;
          info.querySelector('.queue-meta').textContent = item.status;

          const tag = document.createElement('span');
          tag.className = 'status-tag' + (item.done ? ' ok' : item.error ? ' fail' : item.status === 'enviando' ? ' sending' : '');
          tag.textContent = item.done ? 'ok' : item.error ? 'erro' : item.status === 'enviando' ? '···' : 'fila';

          const removeBtn = document.createElement('button');
          removeBtn.className = 'queue-remove';
          removeBtn.title = 'Remover';
          removeBtn.innerHTML = '<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M2 2l7 7M9 2l-7 7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>';
          removeBtn.addEventListener('click', () => {
            state.uploadQueue.splice(idx, 1);
            renderQueue();
          });

          row.append(info, tag, removeBtn);
          queueListEl.append(row);
        });
      }

      async function loadMusics() {
        setStatus('Carregando músicas…');
        try {
          const res = await fetch('/musics', { cache: 'no-store' });
          if (!res.ok) throw new Error(await res.text());
          const data = await res.json();
          state.musics = Array.isArray(data.musicas) ? data.musicas : [];
          state.selected.clear();
          renderMusics();
          setStatus('Biblioteca atualizada', 'ok');
        } catch { setStatus('Falha ao carregar músicas', 'fail'); }
      }

      async function uploadQueue() {
        if (state.busy || !state.uploadQueue.length) return;
        state.busy = true;
        setStatus('Enviando fila…');
        for (const item of state.uploadQueue) {
          if (item.done) continue;
          item.status = 'enviando';
          renderQueue();
          try {
            const res = await fetch(`/musics?nome=${encodeURIComponent(item.file.name)}`, {
              method: 'PUT',
              headers: { 'Content-Type': item.file.type || 'audio/mpeg' },
              body: item.file,
            });
            if (!res.ok) throw new Error(await res.text());
            item.done = true; item.status = 'enviado';
          } catch { item.error = true; item.status = 'falhou'; }
          renderQueue();
        }
        state.busy = false;
        setStatus('Fila finalizada', 'ok');
        await loadMusics();
      }

      async function deleteSelected() {
        if (state.busy || !state.selected.size) return;
        state.busy = true;
        setStatus('Removendo…');
        for (const name of Array.from(state.selected)) {
          try {
            const res = await fetch(`/musics?nome=${encodeURIComponent(name)}`, { method: 'DELETE' });
            if (!res.ok) throw new Error(await res.text());
            state.selected.delete(name);
          } catch { setStatus(`Falha ao remover ${name}`, 'fail'); break; }
        }
        state.busy = false;
        await loadMusics();
      }

      function selectAllMusics() {
        const allSelected = state.musics.every(m => state.selected.has(m.nome));
        if (allSelected) {
          state.selected.clear();
        } else {
          state.musics.forEach(m => state.selected.add(m.nome));
        }
        renderMusics();
      }

      function clearDoneItems() {
        state.uploadQueue = state.uploadQueue.filter(item => !item.done && !item.error);
        renderQueue();
      }

      async function loadConfig() {
        setStatus('Carregando config…');
        try {
          const res = await fetch('/get-configs', { cache: 'no-store' });
          if (!res.ok) throw new Error(await res.text());
          configEditorEl.value = JSON.stringify(await res.json(), null, 2);
          setStatus('Config carregada', 'ok');
        } catch { setStatus('Falha ao carregar config', 'fail'); }
      }

      async function saveConfig() {
        setStatus('Salvando…');
        try {
          const parsed = JSON.parse(configEditorEl.value);
          const res = await fetch('/configs', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(parsed),
          });
          if (!res.ok) throw new Error(await res.text());
          setStatus('Config salva', 'ok');
        } catch { setStatus('JSON inválido ou falha ao salvar', 'fail'); }
      }

      async function loadErrors() {
        setStatus('Carregando erros…');
        try {
          const res = await fetch('/get-errors', { cache: 'no-store' });
          if (!res.ok) throw new Error(await res.text());
          errorLogEl.textContent = (await res.text()) || 'Sem erros registrados.';
          setStatus('Erros carregados', 'ok');
        } catch { setStatus('Falha ao carregar erros', 'fail'); }
      }

      // Events
      document.querySelectorAll('[data-route]').forEach(b => {
        b.addEventListener('click', () => showView(b.dataset.route));
      });
      backBtnEl.addEventListener('click', goBack);
      $id('refresh-musics').addEventListener('click', loadMusics);
      $id('upload-queue').addEventListener('click', uploadQueue);
      $id('delete-selected').addEventListener('click', deleteSelected);
      $id('select-all-musics').addEventListener('click', selectAllMusics);
      $id('clear-done').addEventListener('click', clearDoneItems);
      $id('reload-config').addEventListener('click', loadConfig);
      $id('save-config').addEventListener('click', saveConfig);
      $id('reload-errors').addEventListener('click', loadErrors);

      fileInputEl.addEventListener('change', () => {
        state.uploadQueue = Array.from(fileInputEl.files || []).map(file => ({
          file, status: 'aguardando', done: false, error: false,
        }));
        renderQueue();
      });

      renderQueue();
      updateNavigation();
    </script>
  </body>
</html>
