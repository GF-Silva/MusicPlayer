<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MusicPlayer</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f6f7f9;
      color: #1b1f24;
    }

    main {
      width: min(92vw, 520px);
      padding: 24px;
      border: 1px solid #d8dee4;
      border-radius: 8px;
      background: #ffffff;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 1.5rem;
      line-height: 1.2;
    }

    p {
      margin: 0;
      line-height: 1.5;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #0d1117;
        color: #f0f6fc;
      }

      main {
        background: #161b22;
        border-color: #30363d;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>MusicPlayer</h1>
    <p>Pagina temporaria do modo WiFi AP.</p>
  </main>
</body>
</html>
